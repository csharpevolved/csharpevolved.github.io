name: Analyzer Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs for the same PR/branch to avoid wasted CI time.
concurrency:
  group: analyzer-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  test:
    name: Build & Test Analyzers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect analyzer changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            analyzers:
              - 'analyzers/**'
              - '.github/workflows/analyzer-tests.yml'

      - name: Skip when analyzer code is unchanged
        if: steps.changes.outputs.analyzers != 'true'
        run: echo "No analyzer changes detected. Skipping analyzer build/tests."

      - name: Setup .NET
        if: steps.changes.outputs.analyzers == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        if: steps.changes.outputs.analyzers == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('analyzers/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        if: steps.changes.outputs.analyzers == 'true'
        run: dotnet restore analyzers/CSharpEvolved.Analyzers.Tests/CSharpEvolved.Analyzers.Tests.csproj

      - name: Build
        if: steps.changes.outputs.analyzers == 'true'
        run: dotnet build analyzers/CSharpEvolved.Analyzers.Tests/CSharpEvolved.Analyzers.Tests.csproj -c Release --no-restore

      - name: Test
        if: steps.changes.outputs.analyzers == 'true'
        run: dotnet test analyzers/CSharpEvolved.Analyzers.Tests/CSharpEvolved.Analyzers.Tests.csproj -c Release --no-build --verbosity normal
